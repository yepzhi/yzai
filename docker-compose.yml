version: '3.8'

services:
  openedai-speech:
    image: ghcr.io/matatonic/openedai-speech-min:latest
    container_name: openedai-speech
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - voices:/app/voices
      - config:/app/config

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WHISPER_MODEL=medium
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL=nomic-embed-text
      - AUDIO_STT_ENGINE=openai
      - AUDIO_TTS_ENGINE=openai
      - AUDIO_TTS_OPENAI_API_BASE_URL=http://host.docker.internal:8000/v1
      - AUDIO_TTS_OPENAI_API_KEY=sk-111
      # Block all HuggingFace downloads — fully local
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - HF_DATASETS_OFFLINE=1
    volumes:
      - open-webui:/app/backend/data

  comfyui:
    image: rocm/pytorch:latest
    container_name: comfyui
    restart: always
    ports:
      - "8188:8188"
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    group_add:
      - video
      - render
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
    volumes:
      - /home/yepzhi/ComfyUI:/app
    working_dir: /app
    command: >
      /bin/bash -c "pip install -r requirements.txt && python3 main.py --listen 0.0.0.0"

  yzai-ui:
    image: nginx:alpine
    container_name: yzai-ui
    restart: always
    ports:
      - "8081:80"
    volumes:
      - ./yzai-ui:/usr/share/nginx/html:ro
      - ./yzai-ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - open-webui

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  voices:
  config:
  open-webui:
